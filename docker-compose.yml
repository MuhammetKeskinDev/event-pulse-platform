# Yerel geliştirme: TimescaleDB + Redis
# Üretimde şifreleri ve imaj etiketlerini ortam değişkenleri / secret'larla yönetin.

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: eventpulse-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventpulse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-eventpulse}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventpulse} -d ${POSTGRES_DB:-eventpulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: eventpulse-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventpulse}:${POSTGRES_PASSWORD:-eventpulse_dev}@timescaledb:5432/${POSTGRES_DB:-eventpulse}
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventpulse}:${POSTGRES_PASSWORD:-eventpulse_dev}@timescaledb:5432/${POSTGRES_DB:-eventpulse}
      REDIS_URL: redis://redis:6379
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      # Yeni kuralların worker’da gecikmesiz denenmesi (prod’da yükseltin)
      ALERT_RULES_CACHE_TTL_MS: "3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescaledb_data:
  redis_data:
